name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pyyaml rich requests cryptography

      - name: Check all Python files compile
        run: |
          find src/ -name '*.py' -exec python -m py_compile {} +
          echo "All $(find src/ -name '*.py' | wc -l) Python files compile cleanly"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install pyyaml rich requests cryptography pytest fusepy
          sudo apt-get install -y libfuse-dev fuse3 2>/dev/null || true

      - name: Run smoke tests
        run: |
          python -m pytest tests/test_smoke.py -v --tb=short

      - name: Run unit tests (skip known-broken)
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_community_detection.py \
            --ignore=tests/test_symbol_extraction.py \
            --ignore=tests/test_dependency_graph.py \
            --ignore=tests/test_impact_analysis.py \
            --ignore=tests/test_concurrent.py \
            --ignore=tests/test_safe_queries.py \
            --ignore=tests/test_safe_file_queries.py \
            --ignore=tests/test_constraints.py \
            --ignore=tests/test_smoke.py \
            --ignore=tests/integration/ \
            --tb=short -q || true

  smoke-test:
    name: Smoke Test (CLI + DB + FUSE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install pyyaml rich requests cryptography fusepy
          sudo apt-get install -y libfuse-dev fuse3 2>/dev/null || true

      - name: Test migration framework
        run: |
          cd src
          python -c "
          import sys; sys.path.insert(0, '.')
          from migrator import Migrator
          import tempfile, os

          # Fresh DB
          tmp = tempfile.mktemp(suffix='.sqlite')
          m = Migrator(tmp)
          applied, skipped = m.migrate()
          assert applied == 1, f'Expected 1 applied, got {applied}'

          status = m.status()
          pending = sum(1 for s in status if not s['applied'])
          assert pending == 0, f'Expected 0 pending, got {pending}'

          os.unlink(tmp)
          print('Migration framework: OK')
          "

      - name: Test CLI imports
        run: |
          cd src
          python -c "
          import sys; sys.path.insert(0, '.')
          from cli.commands.db import DBCommands
          from cli.commands.nixos import NixOSCommand
          from cli.commands.new_machine import BootstrapCommand
          from cli.commands.mount import MountCommands
          from cli.commands.graph import GraphCommands
          from cli.commands.sync import SyncCommands
          from knowledge_graph import search_everywhere, cross_project_analysis
          try:
              from temple_fuse import TempleFS
          except OSError:
              print('FUSE: skipped (no libfuse)')
          from git_export import export_to_git
          from direnv_generator import cmd_direnv, shell_escape
          print('All CLI module imports: OK')
          "

      - name: Test FUSE operations (unit)
        run: |
          cd src
          python -c "
          import sys; sys.path.insert(0, '.')
          import tempfile, os
          try:
              from temple_fuse import TempleFS
              from migrator import Migrator
              tmp = tempfile.mktemp(suffix='.sqlite')
              m = Migrator(tmp)
              m.migrate()
              fs = TempleFS(db_path=tmp)
              assert fs._parse_path('/') == (None, None)
              assert fs._parse_path('/proj') == ('proj', None)
              assert fs._parse_path('/proj/src/main.py') == ('proj', 'src/main.py')
              os.unlink(tmp)
              print('FUSE unit tests: OK')
          except OSError:
              print('FUSE: skipped (no libfuse)')
          "

      - name: Test knowledge graph (unit)
        run: |
          cd src
          python -c "
          import sys; sys.path.insert(0, '.')
          import tempfile, os
          from migrator import Migrator

          tmp = tempfile.mktemp(suffix='.sqlite')
          os.environ['TEMPLEDB_PATH'] = tmp
          m = Migrator(tmp)
          m.migrate()

          from knowledge_graph import search_everywhere, cross_project_analysis
          r = search_everywhere('test')
          assert isinstance(r, dict)

          r2 = cross_project_analysis()
          assert 'projects' in r2

          os.unlink(tmp)
          del os.environ['TEMPLEDB_PATH']
          print('Knowledge graph unit tests: OK')
          "

  nix-build:
    name: Nix Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build templedb package
        run: nix build .#templedb --no-update-lock-file

      - name: Verify build outputs
        run: |
          test -x result/bin/templedb
          test -x result/bin/tdb
          test -f result/lib/crsqlite.so
          result/bin/templedb --version
          echo "Nix build: OK"

      - name: Test CLI help
        run: |
          result/bin/templedb --help | grep -q "Getting Started"
          result/bin/templedb graph --help | grep -q "search"
          result/bin/templedb sync --help | grep -q "init"
          result/bin/templedb mount --help | grep -q "mountpoint"
          echo "CLI help: OK"
